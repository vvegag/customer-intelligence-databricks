# Databricks Asset Bundle (DAB) Configuration
bundle:
  name: customer_intelligence
  
variables:
  catalog:
    description: Unity Catalog name
    default: customer_intelligence
  
  schema:
    description: Schema name
    default: gold

  num_workers:
    description: Number of workers for the job clusters
    default: 1

targets:
  # DEVELOPMENT environment
  # ⚠️ workspace.host não aceita variável (limitação do Databricks Asset Bundles —
  # o host precisa ser resolvido antes da interpolação). Ao trocar de conta/workspace,
  # atualize o valor abaixo manualmente nos dois targets.
  dev:
    mode: development
    workspace:
      host: https://dbc-58d2306a-6a4b.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

    variables:
      catalog: customer_intelligence_dev
      num_workers: 1

  # PRODUCTION environment
  prod:
    mode: production
    workspace:
      host: https://dbc-58d2306a-6a4b.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

    variables:
      catalog: customer_intelligence
      num_workers: 4

resources:
  jobs:
    # JOB: Feature Store Update
    feature_store_update:
      name: "[${bundle.target}] Feature Store Update"

      tasks:
        - task_key: update_features
          notebook_task:
            notebook_path: ./03_gold/Feature_Store_Production.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

    # JOB: ML Training Pipeline
    ml_training_pipeline:
      name: "[${bundle.target}] ML Training Pipeline"

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
        timezone_id: "America/Sao_Paulo"

      tasks:
        - task_key: train_sparkml
          notebook_task:
            notebook_path: ./production/models/sparkml_distributed.py

          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: mlflow_experiments
          depends_on:
            - task_key: train_sparkml

          notebook_task:
            notebook_path: ./production/models/mlflow_advanced.py

          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
