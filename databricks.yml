# Databricks Asset Bundle (DAB) Configuration
bundle:
  name: customer_intelligence

variables:
  catalog:
    description: Unity Catalog name
    default: customer_intelligence

  schema:
    description: Schema name
    default: gold

  num_workers:
    description: Number of workers for the job clusters
    default: 1

targets:
  # DEVELOPMENT environment
  # workspace.host propositalmente OMITIDO: o bundle usa o host do profile do
  # CLI ativo no momento do deploy (`databricks bundle deploy -p <profile>`).
  # Assim funciona em qualquer conta/workspace sem editar este arquivo — útil
  # tanto pra trocar de conta quanto pra alguém avaliando o projeto rodar com
  # a própria conta.
  dev:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

    variables:
      catalog: customer_intelligence_dev
      num_workers: 1

  # PRODUCTION environment
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

    variables:
      catalog: customer_intelligence
      num_workers: 4

resources:
  jobs:
    # JOB: Feature Store Update
    feature_store_update:
      name: "[${bundle.target}] Feature Store Update"

      # max_concurrent_runs evita que um "Run Now" manual sobreponha o
      # schedule automático e grave concorrentemente nas mesmas tabelas Delta.
      max_concurrent_runs: 1

      tasks:
        - task_key: update_features
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: ./production/feature_store/feature_store_complete.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

    # JOB: ML Training Pipeline
    ml_training_pipeline:
      name: "[${bundle.target}] ML Training Pipeline"

      max_concurrent_runs: 1

      schedule:
        quartz_cron_expression: "0 0 2 * * ?"  # Daily at 2 AM
        timezone_id: "America/Sao_Paulo"

      tasks:
        - task_key: train_sparkml
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: ./production/models/sparkml_distributed.py

          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: mlflow_experiments
          depends_on:
            - task_key: train_sparkml
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000

          notebook_task:
            notebook_path: ./production/models/mlflow_advanced.py

          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1

    # JOB: Main Pipeline (Bronze -> Silver -> Gold -> Models -> Scoring -> Monitoring)
    # Orquestra o fluxo narrativo principal (pastas 01_bronze a 07_monitoring), que
    # até aqui só rodava manualmente clicando notebook por notebook.
    #
    # AVISO CONHECIDO: nenhum notebook do fluxo principal lê dbutils.widgets /
    # base_parameters (todos têm CATALOG = "customer_intelligence" hardcoded na
    # célula de config). Isso significa que rodar este job sob o target "dev" NÃO
    # isola de fato o catálogo (a variável catalog: customer_intelligence_dev do
    # target dev fica sem efeito aqui) — o job escreve no catálogo de produção
    # mesmo sob "dev". Corrigir isso exigiria parametrizar a célula de config
    # duplicada em ~12 notebooks; fica registrado como limitação conhecida, não
    # corrigida nesta rodada.
    #
    # NOTIFICAÇÕES: email_notifications/webhook_notifications propositalmente
    # omitidas — exigiriam um endereço de e-mail ou webhook real cravado no
    # YAML, o que não faz sentido pra um repo de portfólio genérico. retry +
    # timeout + max_concurrent_runs (abaixo) cobrem a parte de resiliência que
    # não depende de uma identidade externa específica.
    main_pipeline:
      name: "[${bundle.target}] Main Pipeline (Bronze a Monitoring)"

      max_concurrent_runs: 1

      schedule:
        quartz_cron_expression: "0 0 4 ? * MON"  # Semanal, segunda 4h (2h após ml_training_pipeline, evita disputa de cluster)
        timezone_id: "America/Sao_Paulo"

      tasks:
        - task_key: bronze_ingestion
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./01_bronze/Ingestao Dados Bronze.py"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: silver_transformation
          depends_on:
            - task_key: bronze_ingestion
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./02_silver/Transformacao Silver.py"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: gold_feature_engineering
          depends_on:
            - task_key: silver_transformation
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./03_gold/Feature Engineering Gold.py"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        # --- fan-out: dependem só de gold_feature_engineering ---
        - task_key: model_churn_prediction
          depends_on:
            - task_key: gold_feature_engineering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Modelo Churn Prediction.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: model_propensity_score
          depends_on:
            - task_key: gold_feature_engineering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Modelo Propensity Score.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: model_segmentacao_clustering
          depends_on:
            - task_key: gold_feature_engineering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Segmentacao Clientes Clustering.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: model_ativacao_saldo_dormente
          depends_on:
            - task_key: gold_feature_engineering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Ativacao Saldo Dormente.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: model_forecast_gmv
          depends_on:
            - task_key: gold_feature_engineering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Forecast GMV e Resgates.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1  # Prophet é single-node, mais workers não ajuda

        # --- dependem de gold.customer_segments (saída de model_segmentacao_clustering) ---
        - task_key: model_segmentacao_regional
          depends_on:
            - task_key: model_segmentacao_clustering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Segmentacao Regional.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        - task_key: model_sistema_recomendacao
          depends_on:
            - task_key: model_segmentacao_clustering
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./04_models/Sistema Recomendacao.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        # --- depende do modelo de Churn já ter registrado o alias @champion ---
        - task_key: batch_scoring
          depends_on:
            - task_key: model_churn_prediction
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./05_scoring/Batch Scoring.py"
          new_cluster:
            spark_version: "14.3.x-ml-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}

        # --- último: aguarda todo o resto ---
        - task_key: monitoring_performance
          depends_on:
            - task_key: model_propensity_score
            - task_key: model_ativacao_saldo_dormente
            - task_key: model_forecast_gmv
            - task_key: model_segmentacao_regional
            - task_key: model_sistema_recomendacao
            - task_key: batch_scoring
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 120000
          notebook_task:
            notebook_path: "./07_monitoring/Monitoramento Performance.py"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: ${var.num_workers}
